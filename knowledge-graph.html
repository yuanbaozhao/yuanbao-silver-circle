<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>银发经济知识图谱｜元宝的银发圈</title><meta name="description" content="连接银发企业、百科词条、政策与服务模式的交互式知识图谱。"><link rel="stylesheet" href="assets/site-shell.css"><style>:root{--ink:#111615;--muted:#6f7772;--line:rgba(17,22,21,.14);--green:#183d36;--gold:#9a7435;--serif:"Songti SC","Noto Serif SC",Georgia,serif}*{box-sizing:border-box}body{margin:0;color:var(--ink);font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(180deg,#fbf8f1,#f6f1e8,#e9e1d3)}a{color:inherit;text-decoration:none}.wrap{width:min(1220px,calc(100% - 44px));margin:auto}.hero{padding:56px 0 34px}.eyebrow{color:var(--gold);font-weight:900;font-size:.76rem;letter-spacing:.14em}.hero h1{margin:16px 0;font:700 clamp(3rem,7vw,6.5rem)/1 var(--serif)}.lead{max-width:820px;color:#45504c;line-height:1.9}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin:24px 0}.toolbar button{border:1px solid var(--line);border-radius:999px;padding:9px 14px;background:#fffdf8;cursor:pointer}.toolbar button.active{background:var(--green);color:#fff}.stage{position:relative;min-height:680px;border:1px solid var(--line);background:radial-gradient(circle at center,#fffdf8,#eee6d8);overflow:hidden}.canvas{position:absolute;inset:0}.node{position:absolute;width:150px;min-height:70px;display:grid;place-items:center;text-align:center;padding:12px;border:1px solid var(--line);border-radius:16px;background:#fff;box-shadow:0 10px 25px #183d3615;cursor:pointer;transition:.2s}.node:hover,.node.active{transform:translateY(-4px);border-color:var(--gold)}.node.company{background:#183d36;color:#fff}.node.wiki{background:#fffaf0}.node.policy{background:#f1e5cf}.node small{display:block;margin-top:5px;opacity:.7}.edge{position:absolute;height:1px;background:#9a74356b;transform-origin:left center;pointer-events:none}.detail{display:grid;grid-template-columns:1fr auto;gap:20px;margin:18px 0 10px;padding:24px;border:1px solid var(--line);background:#fffdf8}.detail h2{margin:0 0 8px;font:700 1.8rem var(--serif)}.detail p{margin:0;color:var(--muted);line-height:1.8}.detail a{align-self:center;padding:12px 18px;background:var(--green);color:#fff;font-weight:800}.legend{display:flex;gap:16px;flex-wrap:wrap;color:var(--muted);font-size:.82rem}@media(max-width:760px){.wrap{width:min(100% - 28px,1220px)}.stage{min-height:820px}.node{width:118px;font-size:.82rem}.detail{grid-template-columns:1fr}.detail a{justify-self:start}}</style></head><body data-page="graph" data-title="银发经济知识图谱" data-updated="2026-07-18"><main><section class="wrap hero"><div class="eyebrow">KNOWLEDGE GRAPH · V1</div><h1>银发经济<br>知识图谱</h1><p class="lead">从三家标杆企业出发，连接居家养老、社区养老、长期护理保险、银发旅居和银发经济等核心词条。点击节点查看关系与研究入口。</p><div class="toolbar" id="toolbar"><button class="active" data-type="all">全部节点</button><button data-type="company">企业</button><button data-type="wiki">百科</button><button data-type="policy">政策与机制</button></div><div class="legend"><span>● 企业案例</span><span>○ 百科词条</span><span>◆ 政策与机制</span></div></section><section class="wrap"><div class="stage"><div class="canvas" id="canvas"></div></div><div class="detail" id="detail"><div><h2>选择一个节点</h2><p>查看该节点的定位、关系和研究入口。</p></div></div></section></main><script>const nodes=[{id:'taikang',name:'泰康之家',type:'company',url:'company-taikang-community.html',desc:'保险资本、持续照护社区和医养融合的长期客户经营体系。',x:12,y:18},{id:'fushoukang',name:'福寿康',type:'company',url:'company-fushoukang.html',desc:'以长护险、护理站点和数字平台构建社区居家照护网络。',x:12,y:48},{id:'joru',name:'九如城',type:'company',url:'company-joru.html',desc:'以机构为区域支点，连接康复医疗、社区和家庭的城市养老网络。',x:12,y:76},{id:'silver',name:'银发经济',type:'wiki',url:'wiki-silver-economy.html',desc:'围绕老龄人口需求形成的产品、服务、产业与社会创新体系。',x:72,y:12},{id:'home',name:'居家养老',type:'wiki',url:'wiki-home-care.html',desc:'以家庭为主要生活场景，由专业服务进入家庭完成照护交付。',x:72,y:36},{id:'community',name:'社区养老',type:'wiki',url:'wiki-community-care.html',desc:'以社区设施、服务站点和资源网络支撑就近养老。',x:72,y:58},{id:'travel',name:'银发旅居',type:'wiki',url:'wiki-silver-travel.html',desc:'将居住、旅行、社交、健康和文化体验组合为阶段性生活产品。',x:72,y:80},{id:'ltc',name:'长期护理保险',type:'policy',url:'wiki-ltc-insurance.html',desc:'为长期失能人员基本生活照料和护理提供支付支持。',x:43,y:44},{id:'ccrc',name:'持续照护社区',type:'policy',url:'company-taikang-community.html#model',desc:'在同一体系内提供从独立生活到专业护理的连续服务。',x:43,y:16},{id:'network',name:'城市养老服务网络',type:'policy',url:'company-joru.html#model',desc:'以机构、社区和居家节点形成分层协同的城市服务供给。',x:43,y:72}];const edges=[['taikang','ccrc'],['ccrc','silver'],['fushoukang','ltc'],['fushoukang','home'],['fushoukang','community'],['joru','network'],['network','community'],['joru','home'],['joru','travel'],['taikang','silver']];const canvas=document.getElementById('canvas'),detail=document.getElementById('detail');function draw(filter='all'){canvas.innerHTML='';const visible=nodes.filter(n=>filter==='all'||n.type===filter),ids=new Set(visible.map(n=>n.id)),map={};visible.forEach(n=>{const el=document.createElement('button');el.className='node '+n.type;el.style.left=n.x+'%';el.style.top=n.y+'%';el.innerHTML='<b>'+n.name+'</b><small>'+({company:'企业案例',wiki:'百科词条',policy:'政策与机制'}[n.type])+'</small>';el.onclick=()=>show(n,el);canvas.appendChild(el);map[n.id]=el});requestAnimationFrame(()=>edges.forEach(([a,b])=>{if(!ids.has(a)||!ids.has(b))return;const A=map[a],B=map[b],x1=A.offsetLeft+A.offsetWidth/2,y1=A.offsetTop+A.offsetHeight/2,x2=B.offsetLeft+B.offsetWidth/2,y2=B.offsetTop+B.offsetHeight/2,len=Math.hypot(x2-x1,y2-y1),ang=Math.atan2(y2-y1,x2-x1)*180/Math.PI,e=document.createElement('div');e.className='edge';e.style.left=x1+'px';e.style.top=y1+'px';e.style.width=len+'px';e.style.transform='rotate('+ang+'deg)';canvas.insertBefore(e,canvas.firstChild)}))}function show(n,el){document.querySelectorAll('.node').forEach(x=>x.classList.remove('active'));el.classList.add('active');const related=edges.filter(e=>e.includes(n.id)).map(e=>nodes.find(x=>x.id===e.find(i=>i!==n.id)).name);detail.innerHTML='<div><h2>'+n.name+'</h2><p>'+n.desc+'</p><p><b>关联节点：</b>'+(related.join('、')||'待补充')+'</p></div><a href="'+n.url+'">进入研究页面 →</a>'}document.getElementById('toolbar').onclick=e=>{if(!e.target.matches('button'))return;document.querySelectorAll('.toolbar button').forEach(x=>x.classList.remove('active'));e.target.classList.add('active');draw(e.target.dataset.type)};draw();addEventListener('resize',()=>draw(document.querySelector('.toolbar button.active').dataset.type));</script><script src="assets/site-shell.js"></script></body></html>
